# ===========================
# GST Billing Application
# ===========================

# Server
server.port=8080

# ===========================
# MySQL Database Config
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/gst_billing_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===========================
# Logging
# ===========================
logging.level.com.company.gstbilling=DEBUG
logging.level.org.springframework.web=INFO
